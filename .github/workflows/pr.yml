name: PR Checks

on:
  pull_request:
    # include `edited` so the PR-title lint re-runs when the title changes
    types: [opened, edited, synchronize, reopened]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate commit messages
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.sha }} --verbose

      # PRs are squash-merged, so the PR title becomes the commit subject on main that
      # semantic-release reads to decide the version bump. It must be a conventional commit.
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: printf '%s\n' "$PR_TITLE" | npx commitlint --verbose

      - name: Run tests
        run: npm test

      # plugin/skills/**/SKILL.md is generated from the guides by scripts/generate-skills.mjs
      # and committed. Rebuild and fail if the committed copy drifted from the guides.
      - name: Verify generated skills are in sync
        run: |
          npm run build
          if ! git diff --exit-code -- plugin/skills; then
            echo "::error::plugin/skills is out of sync with the guides. Run 'npm run build' (or 'npm run generate:skills') and commit the result." >&2
            exit 1
          fi

      # The plugin's own version (host/marketplace-agnostic) is what Claude Code uses
      # to detect an update. If this PR changes anything under plugin/, the version must
      # change too — otherwise installs never refresh.
      - name: Require plugin version bump when plugin files change
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.sha }}"
          if git diff --name-only "$base...$head" | grep -q '^plugin/'; then
            base_ver=$(git show "$base:plugin/.claude-plugin/plugin.json" 2>/dev/null \
              | node -pe 'JSON.parse(require("fs").readFileSync(0,"utf8")).version' 2>/dev/null || echo "")
            head_ver=$(node -pe 'require("./plugin/.claude-plugin/plugin.json").version')
            if [ -n "$base_ver" ] && [ "$base_ver" = "$head_ver" ]; then
              echo "::error::plugin/ changed but the plugin version is still $head_ver. Bump \"version\" in plugin/.claude-plugin/plugin.json." >&2
              exit 1
            fi
            echo "plugin version: ${base_ver:-<new>} -> $head_ver"
          else
            echo "no plugin/ changes; version-bump check skipped"
          fi

      - name: Collect changed files for Prettier
        id: prettier_files
        shell: bash
        run: |
          mapfile -t files < <(
            git diff --name-only --diff-filter=ACMRT \
              "${{ github.event.pull_request.base.sha }}...${{ github.sha }}" \
              | grep -E '\.(cjs|js|json|md|mjs|ts|tsx|yaml|yml)$' || true
          )

          if [ ${#files[@]} -eq 0 ]; then
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "count=${#files[@]}"
            echo "files<<EOF"
            printf '%s\n' "${files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Prettier check
        if: steps.prettier_files.outputs.count != '0'
        shell: bash
        run: |
          mapfile -t files <<'EOF'
          ${{ steps.prettier_files.outputs.files }}
          EOF
          npm run prettier:check -- "${files[@]}"
