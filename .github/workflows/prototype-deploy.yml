name: Prototype Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: prototype-deploy-${{ github.repository }}
  cancel-in-progress: true

jobs:
  classify:
    runs-on: ubuntu-latest
    outputs:
      is_prototype: ${{ steps.topics.outputs.is_prototype }}
      topics_csv: ${{ steps.topics.outputs.topics_csv }}
    steps:
      - name: Resolve repository topics
        id: topics
        uses: actions/github-script@v7
        with:
          script: |
            const { data: topicData } = await github.rest.repos.getAllTopics({
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            const topics = topicData.names || [];
            const hasPrototype = topics.includes("prototype");

            core.setOutput("is_prototype", String(hasPrototype));
            core.setOutput("topics_csv", topics.sort().join(", "));

      - name: Publish classification summary
        shell: bash
        run: |
          {
            echo "### Prototype classification"
            echo ""
            echo "- Topics: ${{ steps.topics.outputs.topics_csv || 'none' }}"
            echo "- Is prototype: ${{ steps.topics.outputs.is_prototype }}"
          } >> "$GITHUB_STEP_SUMMARY"

  build-and-push:
    needs: classify
    if: ${{ needs.classify.outputs.is_prototype == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
      digest: ${{ steps.push.outputs.digest }}
      port: ${{ steps.detect.outputs.port }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout automation repo (templates)
        uses: actions/checkout@v4
        with:
          repository: Cognigy/prototype-automation
          ref: main
          token: ${{ secrets.PROTOTYPE_SYNC_TOKEN }}
          path: automation

      - name: Detect stack, generate Dockerfile if needed, resolve port
        id: detect
        run: |
          PORT=""
          STACK=""
          DOCKERFILE_GENERATED="false"

          # 1. Read port from .prototype-meta.toml if present
          if [ -f .prototype-meta.toml ]; then
            META_PORT=$(python3 -c "
          import tomllib, sys
          try:
              with open('.prototype-meta.toml', 'rb') as f:
                  meta = tomllib.load(f)
              port = meta.get('port', '')
              if port:
                  print(int(port))
          except Exception:
              pass
          " 2>/dev/null || true)
            if [ -n "$META_PORT" ]; then
              PORT="$META_PORT"
              echo "Port from .prototype-meta.toml: $PORT"
            fi
          fi

          # 2. Generate Dockerfile if one is not already present
          if [ ! -f Dockerfile ]; then
            echo "No Dockerfile found. Detecting project stack..."

            if [ -f package.json ]; then
              # Next.js runs its own server -> use node template
              # React SPA (CRA, Vite) -> multi-stage build + nginx
              if python3 -c "
          import json, sys
          with open('package.json') as f:
              pkg = json.load(f)
          deps = {**pkg.get('dependencies', {}), **pkg.get('devDependencies', {})}
          if 'next' in deps:
              sys.exit(1)
          if any(k in deps for k in ('react', 'react-dom')):
              sys.exit(0)
          sys.exit(1)
          " 2>/dev/null; then
                STACK="react"
              else
                STACK="node"
              fi
            elif [ -f requirements.txt ] || [ -f pyproject.toml ] || [ -f Pipfile ]; then
              STACK="python"
            elif [ -f go.mod ]; then
              STACK="go"
            elif [ -f index.html ]; then
              STACK="static"
            fi

            if [ -z "$STACK" ]; then
              echo "::error::No Dockerfile found and unable to detect project stack. Provide a Dockerfile or use a supported stack (Node.js, React, Python, Go, static)."
              exit 1
            fi

            TEMPLATE="automation/templates/dockerfiles/${STACK}.Dockerfile"
            if [ ! -f "$TEMPLATE" ]; then
              echo "::error::Dockerfile template not found: $TEMPLATE"
              exit 1
            fi

            EFFECTIVE_PORT="${PORT:-3000}"
            cp "$TEMPLATE" Dockerfile
            sed -i "s/__PORT__/${EFFECTIVE_PORT}/g" Dockerfile
            DOCKERFILE_GENERATED="true"
            echo "Generated Dockerfile from ${STACK} template (port ${EFFECTIVE_PORT})"
          fi

          # 3. If port still unset, parse EXPOSE from Dockerfile
          if [ -z "$PORT" ]; then
            PORT=$(grep -oP '^EXPOSE\s+\K\d+' Dockerfile | head -1 || true)
          fi

          # 4. Final fallback
          PORT="${PORT:-3000}"

          echo "port=$PORT" >> "$GITHUB_OUTPUT"
          echo "stack=$STACK" >> "$GITHUB_OUTPUT"
          echo "dockerfile_generated=$DOCKERFILE_GENERATED" >> "$GITHUB_OUTPUT"
          echo "Resolved container port: $PORT"

      - name: Publish Dockerfile summary
        if: steps.detect.outputs.dockerfile_generated == 'true'
        shell: bash
        run: |
          {
            echo "### Dockerfile auto-generated"
            echo ""
            echo "- Stack: \`${{ steps.detect.outputs.stack }}\`"
            echo "- Port: \`${{ steps.detect.outputs.port }}\`"
            echo "- Template: \`${{ steps.detect.outputs.stack }}.Dockerfile\`"
            echo ""
            echo "To customize, add your own \`Dockerfile\` to the repository root."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DEV_ACR_URL }}
          username: ${{ secrets.DEV_REGISTRY_USERNAME }}
          password: ${{ secrets.DEV_REGISTRY_PASSWORD }}

      - name: Resolve image metadata
        id: meta
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d/ -f2)
          IMAGE="${{ secrets.DEV_ACR_URL }}/${REPO_NAME}"
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "sha_short=$SHA_SHORT" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_short }}
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
            ${{ steps.meta.outputs.image }}:0.0.${{ github.run_number }}

      - name: Publish build summary
        shell: bash
        run: |
          {
            echo "### Container image published"
            echo ""
            echo "- Image: \`${{ steps.meta.outputs.image }}\`"
            echo "- Tags: \`latest\`, \`${{ steps.meta.outputs.sha_short }}\`, \`${{ github.sha }}\`, \`0.0.${{ github.run_number }}\`"
            echo "- Digest: \`${{ steps.push.outputs.digest }}\`"
            echo ""
            echo "Flux image automation will detect the semver tag and deploy."
          } >> "$GITHUB_STEP_SUMMARY"

  flux-pr:
    needs:
      - classify
      - build-and-push
    if: ${{ needs.classify.outputs.is_prototype == 'true' && needs.build-and-push.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Derive app name
        id: app
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d/ -f2)
          APP_NAME=$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]' | tr '.' '-')
          echo "name=$APP_NAME" >> "$GITHUB_OUTPUT"

      - name: Checkout automation repo (flux templates)
        uses: actions/checkout@v4
        with:
          repository: Cognigy/prototype-automation
          ref: main
          token: ${{ secrets.PROTOTYPE_SYNC_TOKEN }}
          path: automation

      - name: Clone fleet repo
        run: |
          CLONE_URL=$(echo "https://cognigy.visualstudio.com/Cognigy.AI/_git/flux-fleet-non-prod" | sed "s|https://|https://pat:${{ secrets.AZURE_DEVOPS_PAT }}@|")
          git clone --depth 1 "$CLONE_URL" fleet-repo

      - name: Check if flux manifests already exist
        id: check
        run: |
          APP_DIR="fleet-repo/azure/germany-west-central/dev/${{ steps.app.outputs.name }}"
          if [ -d "$APP_DIR" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate BasicAuth credentials
        id: auth
        if: steps.check.outputs.exists != 'true'
        run: |
          AUTH_USERNAME="cognigy"
          AUTH_PASSWORD=$(openssl rand -base64 32)

          # Mask password in logs
          echo "::add-mask::$AUTH_PASSWORD"

          # Base64-encode for Kubernetes Secret
          AUTH_USERNAME_B64=$(echo -n "$AUTH_USERNAME" | base64)
          AUTH_PASSWORD_B64=$(echo -n "$AUTH_PASSWORD" | base64)

          echo "username=$AUTH_USERNAME" >> "$GITHUB_OUTPUT"
          echo "password=$AUTH_PASSWORD" >> "$GITHUB_OUTPUT"
          echo "username_b64=$AUTH_USERNAME_B64" >> "$GITHUB_OUTPUT"
          echo "password_b64=$AUTH_PASSWORD_B64" >> "$GITHUB_OUTPUT"

      - name: Generate flux manifests from templates
        if: steps.check.outputs.exists != 'true'
        run: |
          APP_NAME="${{ steps.app.outputs.name }}"
          IMAGE_TAG="0.0.${{ github.run_number }}"
          DEV_ACR_URL="${{ secrets.DEV_ACR_URL }}"
          AUTH_USERNAME_B64="${{ steps.auth.outputs.username_b64 }}"
          AUTH_PASSWORD_B64="${{ steps.auth.outputs.password_b64 }}"
          CONTAINER_PORT="${{ needs.build-and-push.outputs.port }}"

          # Derive the Ingress host from PROTOTYPE_BASE_URL (strip scheme)
          PROTOTYPE_HOST=$(echo "${{ vars.PROTOTYPE_BASE_URL }}" | sed 's|https\?://||')

          APP_DIR="fleet-repo/azure/germany-west-central/dev/${APP_NAME}"
          FLUX_SYS_DIR="fleet-repo/azure/germany-west-central/dev/flux-system"

          mkdir -p "$APP_DIR"

          # Generate app manifests from templates
          for tpl in automation/templates/flux/*.yaml; do
            filename=$(basename "$tpl")
            if [ "$filename" = "flux-kustomization.yaml" ]; then
              # This file goes into flux-system/<app-name>.yaml
              sed -e "s|__APP_NAME__|${APP_NAME}|g" \
                  -e "s|__DEV_ACR_URL__|${DEV_ACR_URL}|g" \
                  -e "s|__IMAGE_TAG__|${IMAGE_TAG}|g" \
                  -e "s|__AUTH_USERNAME_B64__|${AUTH_USERNAME_B64}|g" \
                  -e "s|__AUTH_PASSWORD_B64__|${AUTH_PASSWORD_B64}|g" \
                  -e "s|__PROTOTYPE_HOST__|${PROTOTYPE_HOST}|g" \
                  -e "s|__CONTAINER_PORT__|${CONTAINER_PORT}|g" \
                  "$tpl" > "${FLUX_SYS_DIR}/${APP_NAME}.yaml"
            else
              sed -e "s|__APP_NAME__|${APP_NAME}|g" \
                  -e "s|__DEV_ACR_URL__|${DEV_ACR_URL}|g" \
                  -e "s|__IMAGE_TAG__|${IMAGE_TAG}|g" \
                  -e "s|__AUTH_USERNAME_B64__|${AUTH_USERNAME_B64}|g" \
                  -e "s|__AUTH_PASSWORD_B64__|${AUTH_PASSWORD_B64}|g" \
                  -e "s|__PROTOTYPE_HOST__|${PROTOTYPE_HOST}|g" \
                  -e "s|__CONTAINER_PORT__|${CONTAINER_PORT}|g" \
                  "$tpl" > "${APP_DIR}/${filename}"
            fi
          done

          # Register the app in flux-system/kustomization.yaml
          if ! grep -q "^- ${APP_NAME}.yaml$" "${FLUX_SYS_DIR}/kustomization.yaml"; then
            echo "- ${APP_NAME}.yaml" >> "${FLUX_SYS_DIR}/kustomization.yaml"
          fi

          echo "Generated flux manifests:"
          ls -la "$APP_DIR"

      - name: Create branch and push
        if: steps.check.outputs.exists != 'true'
        working-directory: fleet-repo
        run: |
          APP_NAME="${{ steps.app.outputs.name }}"
          BRANCH="prototype/${APP_NAME}"

          git config user.name "prototype-automation"
          git config user.email "prototype-automation@cognigy.com"

          git checkout -b "$BRANCH"
          git add -A
          git commit -m "Add prototype: ${APP_NAME}

          Automated by prototype-deploy workflow.
          Source: ${{ github.repository }}
          Image: ${{ needs.build-and-push.outputs.image }}:0.0.${{ github.run_number }}"

          git push origin "$BRANCH"

      - name: Create pull request (Azure DevOps)
        if: steps.check.outputs.exists != 'true'
        env:
          FLEET_REPO_CLONE_URL: https://cognigy.visualstudio.com/Cognigy.AI/_git/flux-fleet-non-prod
        run: |
          APP_NAME="${{ steps.app.outputs.name }}"
          BRANCH="prototype/${APP_NAME}"
          PROTOTYPE_HOST=$(echo "${{ vars.PROTOTYPE_BASE_URL }}" | sed 's|https\?://||')

          # Parse Azure DevOps org/project/repo from clone URL
          # URL format: https://cognigy.visualstudio.com/PROJECT/_git/REPO
          # or: https://dev.azure.com/ORG/PROJECT/_git/REPO
          if echo "$FLEET_REPO_CLONE_URL" | grep -q "dev.azure.com"; then
            ORG=$(echo "$FLEET_REPO_CLONE_URL" | sed -n 's|https://dev.azure.com/\([^/]*\)/.*|\1|p')
            PROJECT=$(echo "$FLEET_REPO_CLONE_URL" | sed -n 's|https://dev.azure.com/[^/]*/\([^/]*\)/.*|\1|p')
            REPO=$(echo "$FLEET_REPO_CLONE_URL" | sed -n 's|.*/\([^/]*\)$|\1|p')
            API_BASE="https://dev.azure.com/${ORG}/${PROJECT}"
          else
            # visualstudio.com format: https://ORG.visualstudio.com/PROJECT/_git/REPO
            ORG=$(echo "$FLEET_REPO_CLONE_URL" | sed -n 's|https://\([^.]*\)\.visualstudio\.com/.*|\1|p')
            PROJECT=$(echo "$FLEET_REPO_CLONE_URL" | sed -n 's|https://[^/]*/\([^/]*\)/.*|\1|p')
            REPO=$(echo "$FLEET_REPO_CLONE_URL" | sed -n 's|.*/\([^/]*\)$|\1|p')
            API_BASE="https://dev.azure.com/${ORG}/${PROJECT}"
          fi

          API_URL="${API_BASE}/_apis/git/repositories/${REPO}/pullrequests?api-version=7.0"
          AUTH=$(echo -n ":${{ secrets.AZURE_DEVOPS_PAT }}" | base64)

          PAYLOAD=$(jq -n \
            --arg src "refs/heads/${BRANCH}" \
            --arg tgt "refs/heads/master" \
            --arg title "Add prototype: ${APP_NAME}" \
            --arg desc "Automated PR to add Flux manifests for prototype **${APP_NAME}**.\n\n### Included resources\n- Namespace, Deployment, Service, Ingress\n- StripPrefix middleware (path: /${APP_NAME})\n- BasicAuth middleware (unique credentials)\n- Image automation (semver policy)\n- Flux Kustomization wiring\n\n### Routing\n- Host: \`${PROTOTYPE_HOST}\`\n- Path: \`/${APP_NAME}\`\n- Auth: BasicAuth (credentials in step summary of the triggering workflow run)\n\n### Source\n- Repository: \`${{ github.repository }}\`\n- Image: \`${{ needs.build-and-push.outputs.image }}:0.0.${{ github.run_number }}\`\n- Trigger: push to main (\`${{ github.sha }}\`)" \
            '{
              sourceRefName: $src,
              targetRefName: $tgt,
              title: $title,
              description: $desc
            }')

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$API_URL" \
            -H "Authorization: Basic $AUTH" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            PR_ID=$(echo "$BODY" | jq -r '.pullRequestId // empty')
            PR_URL="${API_BASE}/_git/${REPO}/pullrequest/${PR_ID}"
            echo "Pull request created: $PR_URL"
            {
              echo "### Flux PR created"
              echo ""
              echo "- PR: [#${PR_ID}](${PR_URL})"
              echo "- Branch: \`${BRANCH}\` → \`master\`"
              echo "- URL after merge: \`${{ vars.PROTOTYPE_BASE_URL }}/${APP_NAME}\`"
              echo ""
              echo "### BasicAuth credentials"
              echo ""
              echo "- Username: \`${{ steps.auth.outputs.username }}\`"
              echo "- Password: \`${{ steps.auth.outputs.password }}\`"
              echo ""
              echo "> Save these credentials. They are unique to this prototype and will not be shown again."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::Failed to create PR (HTTP ${HTTP_CODE}). Response: $BODY"
            {
              echo "### Flux PR creation failed"
              echo ""
              echo "HTTP status: ${HTTP_CODE}"
              echo '```json'
              echo "$BODY" | jq '.' 2>/dev/null || echo "$BODY"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Publish skip summary
        if: steps.check.outputs.exists == 'true'
        run: |
          {
            echo "### Flux PR skipped"
            echo ""
            echo "Flux manifests already exist for \`${{ steps.app.outputs.name }}\`."
            echo "Image automation will handle subsequent deployments."
          } >> "$GITHUB_STEP_SUMMARY"

  notify_catalog:
    needs:
      - classify
      - build-and-push
    if: ${{ always() && needs.classify.outputs.is_prototype == 'true' && needs.build-and-push.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger automation repo catalog refresh
        if: ${{ secrets.PROTOTYPE_SYNC_TOKEN != '' }}
        uses: actions/github-script@v7
        env:
          AUTOMATION_REPO: Cognigy/prototype-automation
        with:
          github-token: ${{ secrets.PROTOTYPE_SYNC_TOKEN }}
          script: |
            const [owner, repo] = process.env.AUTOMATION_REPO.split("/");
            if (!owner || !repo) {
              core.warning(`Unable to parse automation repository: ${process.env.AUTOMATION_REPO}`);
              return;
            }

            await github.rest.repos.createDispatchEvent({
              owner,
              repo,
              event_type: "prototype-deploy-changed",
              client_payload: {
                source_repository: context.repo.full_name,
                workflow: "prototype-deploy.yml"
              }
            });

            core.info(`Triggered catalog refresh for ${owner}/${repo}`);

      - name: Catalog refresh dispatch skipped (missing token)
        if: ${{ secrets.PROTOTYPE_SYNC_TOKEN == '' }}
        shell: bash
        run: |
          {
            echo "### Catalog refresh dispatch skipped"
            echo ""
            echo "- Missing secret: \`PROTOTYPE_SYNC_TOKEN\`."
            echo "- The hourly automation-repo refresh will still update the catalog."
          } >> "$GITHUB_STEP_SUMMARY"

  skipped:
    needs: classify
    if: ${{ needs.classify.outputs.is_prototype != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain skip reason
        shell: bash
        run: |
          {
            echo "### Prototype deployment skipped"
            echo ""
            echo "- Add topic \`prototype\` to enable build and push."
          } >> "$GITHUB_STEP_SUMMARY"
