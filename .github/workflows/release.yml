name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.BYPASS_BRANCH_PROTECTION_APP_ID }}
          private-key: ${{ secrets.BYPASS_BRANCH_PROTECTION_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      # Node 24 ships npm 11.x — npm OIDC trusted publishing requires npm >= 11.5.1.
      # No registry-url: it writes an _authToken placeholder into .npmrc that would
      # shadow OIDC; the npm CLI resolves the registry + mints the OIDC token itself.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # npm auth comes from OIDC trusted publishing (id-token: write above +
      # a Trusted Publisher configured on npmjs for this repo + release.yml).
      # No NPM_TOKEN: the npm CLI mints a short-lived OIDC token at publish time.
      - name: Release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: npx semantic-release
